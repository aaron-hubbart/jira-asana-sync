# Control API + static web, exposed via the cluster's nginx ingress controller
# (same pattern as your other *.es-sandbox.com tools).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncops-api
  namespace: jira-asana-sync
spec:
  replicas: 2
  selector: { matchLabels: { app: syncops-api } }
  template:
    metadata: { labels: { app: syncops-api } }
    spec:
      serviceAccountName: syncops-api        # from rbac.yaml
      containers:
        - name: api
          image: gcr.io/tam-aaron-hubbart/syncops-api:latest
          ports: [{ containerPort: 8080 }]
          env:
            - { name: SYNC_NAMESPACE, value: jira-asana-sync }
            # No IAP in front of nginx, so don't require the IAP identity header.
            # Add nginx auth (basic-auth / oauth2-proxy) if you need to lock it down.
            - { name: REQUIRE_IAP, value: "false" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits:   { cpu: 250m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: syncops-api
  namespace: jira-asana-sync
spec:
  selector: { app: syncops-api }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncops-web
  namespace: jira-asana-sync
spec:
  replicas: 2
  selector: { matchLabels: { app: syncops-web } }
  template:
    metadata: { labels: { app: syncops-web } }
    spec:
      containers:
        - name: web
          image: gcr.io/tam-aaron-hubbart/syncops-web:latest
          ports: [{ containerPort: 8080 }]
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: syncops-web
  namespace: jira-asana-sync
spec:
  selector: { app: syncops-web }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: syncops
  namespace: jira-asana-sync
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # SSE: the /runs/:name/logs stream needs buffering off + a long read timeout.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # TLS via cert-manager — set this to the SAME issuer your dashboard/timebook use.
    # If you don't use cert-manager, delete this line and the tls: block below.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [jira-sync.es-sandbox.com]
      secretName: syncops-tls
  rules:
    - host: jira-sync.es-sandbox.com
      http:
        paths:
          # More specific path first so /api doesn't fall into the web catch-all.
          - path: /api
            pathType: Prefix
            backend: { service: { name: syncops-api, port: { number: 80 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: syncops-web, port: { number: 80 } } }
