steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --pull
      - -t
      - gcr.io/$PROJECT_ID/syncops-web:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/syncops-web:latest
      - .
images:
  - gcr.io/$PROJECT_ID/syncops-web:$SHORT_SHA
  - gcr.io/$PROJECT_ID/syncops-web:latest
options:
  logging: CLOUD_LOGGING_ONLY
